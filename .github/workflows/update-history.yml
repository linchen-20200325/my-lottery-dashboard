name: Update Lottery History

on:
  schedule:
    # 開獎週二/週五 21:30 GMT+8 (= 13:30 UTC)，API 上線常拖 30-60 分。
    # 多跑 4 次容錯 + 避開 :00 整點高負載 (GitHub cron 整點易延遲/跳過)。
    # concurrency group 互鎖防重疊；download() 看到 added=0 不 commit、不產 noise。
    - cron: '23 14 * * 2,5'   # 22:23 GMT+8 (~1h 後)
    - cron: '53 14 * * 2,5'   # 22:53 GMT+8 (~1.5h 後)
    - cron: '23 15 * * 2,5'   # 23:23 GMT+8 (~2h 後)
    - cron: '23 16 * * 2,5'   # 00:23 GMT+8 (~3h 後，隔日凌晨)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-history
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        # Always update main regardless of which ref triggered (manual dispatch
        # from a feature branch should still land data on main).
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (incremental, 50 periods)
        shell: bash
        run: |
          set -o pipefail
          python -m src.scraper.lotto649_downloader --periods 50 --verbose 2>&1 \
            | tee /tmp/scraper.log

      - name: Detect CSV changes
        id: diff
        run: |
          if git diff --quiet data/lotto649.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new draws — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CSV updated:"
            git diff --stat data/lotto649.csv
          fi

      - name: Commit and push to main (CSV changed)
        # Requires repo setting: Branches → main → "Allow specified actors to
        # bypass required pull requests" includes `github-actions[bot]`.
        # Without that toggle, this step 403s and `Open issue on failure` fires.
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto649.csv
          git commit -m "data: 自動更新樂透歷史 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Rebase defensively in case a human pushed to main between checkout
          # and now. The concurrency group already serializes workflow runs.
          git pull --rebase origin main
          git push origin main

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          {
            echo "Workflow run: $RUN_URL"
            echo ""
            echo "排查清單："
            echo "1. **Run scraper** 紅燈 → 官方 API 異常 / Cloudflare 擋 / 依賴問題"
            echo "2. **Commit and push to main** 紅燈 → bot 沒在 main bypass list（Settings → Branches → main → Allow specified actors to bypass required pull requests）/ rebase 衝突"
            echo "3. 看下方 scraper log tail（含 HTTP status / body preview / per-month row count）"
            echo ""
            echo "手動補救：本機 \`python -m src.scraper.lotto649_downloader --periods 50 --verbose\` 並透過 UI 上傳 CSV。"
            echo ""
            echo "## Scraper log (last 50 lines)"
            echo ""
            echo '```'
            if [ -f /tmp/scraper.log ]; then
              tail -50 /tmp/scraper.log
            else
              echo "(no scraper log captured — step failed before tee)"
            fi
            echo '```'
          } > "$BODY_FILE"
          gh issue create \
            --title "[auto-update] 樂透歷史更新失敗 $(date -u +'%Y-%m-%d')" \
            --body-file "$BODY_FILE"
