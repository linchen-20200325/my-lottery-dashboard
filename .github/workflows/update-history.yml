name: Update Lottery History

on:
  schedule:
    # 每週二、週五 22:00 (GMT+8) = 14:00 UTC，開獎當晚自動抓
    - cron: '0 14 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-history
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (incremental, 50 periods)
        run: python -m src.scraper.lotto649_downloader --periods 50

      - name: Detect CSV changes
        id: diff
        run: |
          if git diff --quiet data/lotto649.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new draws — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CSV updated:"
            git diff --stat data/lotto649.csv
          fi

      - name: Open auto-merge PR (CSV changed)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          BRANCH="auto/data-update-$(date -u +'%Y%m%d-%H%M%S')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/lotto649.csv
          git commit -m "data: 自動更新樂透歷史 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "data: 自動更新樂透歷史 $(date -u +'%Y-%m-%d')" \
            --body "由 \`update-history\` workflow 自動產生 (cron 週二/五 22:00 GMT+8 或手動觸發)。

          Run: $RUN_URL

          CSV 變動由 scraper v3.1 直打官方 API 抓取；走 PR 流程繞過 main branch protection。")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --auto --delete-branch 2>/dev/null || \
          gh pr merge "$PR_URL" --squash --delete-branch || \
          echo "::warning::Auto-merge failed; PR open for manual review: $PR_URL"

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "[auto-update] 樂透歷史更新失敗 $(date -u +'%Y-%m-%d')" \
            --body "Workflow run: $RUN_URL

          排查清單：
          1. **Run scraper** 紅燈 → 官方 API 異常 / Cloudflare 擋 / 依賴問題
          2. **Open auto-merge PR** 紅燈 → branch protection / token 權限 / PR 衝突
          3. 點 Run URL 進去看每一步的展開 log

          手動補救：本機 \`python -m src.scraper.lotto649_downloader --periods 50\` 並透過 UI 上傳 CSV。"
